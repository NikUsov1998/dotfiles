unbind C-b
set -g prefix M-w # C-t
# Config reload
# unbind r
# bind r source-file ~/.tmux.conf \;
# display "Reloaded ~/.tmux.conf"

unbind %	# Split-vertical
unbind '"'	# Split-horisontal
bind h split-window -h -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"

# Переключение панелей с помощью Ctrl + hjkl (как в Vim)
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Альтернатива (если хочешь оставить префикс): Ctrl-b h/j/k/l
# bind-key h select-pane -L
# bind-key j select-pane -D
# bind-key k select-pane -U
# bind-key l select-pane -R

# Для удобства - ресайз панелей с Shift+Ctrl (как в Vim)
bind -n C-M-Left resize-pane -L 2
bind -n C-M-Right resize-pane -R 2
bind -n C-M-Down resize-pane -D 2
bind -n C-M-Up resize-pane -U 2
